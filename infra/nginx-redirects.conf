# 301 redirects from old basepremier.ru site
# Included via: include /etc/nginx/snippets/base-premier-redirects.conf;
# Deploy: cp infra/nginx-redirects.conf /etc/nginx/snippets/base-premier-redirects.conf

# Services / price list
location = /uslugi        { return 301 /services; }
location = /price         { return 301 /services; }
location = /prices        { return 301 /services; }
location = /prais         { return 301 /services; }
location = /uslogi        { return 301 /services; }

# Barbers / team
location = /master        { return 301 /barbers; }
location = /masters       { return 301 /barbers; }
location = /mastera       { return 301 /barbers; }
location = /team          { return 301 /barbers; }

# About
location = /about-us      { return 301 /about; }
location = /o-nas         { return 301 /about; }

# Contacts
location = /contact       { return 301 /contacts; }
location = /kontakty      { return 301 /contacts; }
location = /contacts.html { return 301 /contacts; }

# Home
location = /index.html    { return 301 /; }
location = /home          { return 301 /; }

