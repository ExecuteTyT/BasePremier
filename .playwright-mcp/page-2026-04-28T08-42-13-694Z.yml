            - generic [ref=e290]: "01"
            - generic [ref=e291]:
              - heading "Час, а не 30 минут" [level=3] [ref=e292]
              - paragraph [ref=e293]: Большинство барбершопов выделяют 30 минут на стрижку. Мы — час. В этот час входит детокс кожи головы, мытьё, стрижка по структуре волос, моделирование, укладка и завершающее парфюмирование. В среднем — в два раза больше работы.
          - generic [ref=e295]:
            - generic [ref=e296]: "02"
            - generic [ref=e297]:
              - heading "Профессиональная косметика, а не один шампунь" [level=3] [ref=e298]
              - paragraph [ref=e299]: В нашем зале на полках — Graham Hill, Davines, The London Grooming Co и Solomon's. Шампунь для тонких волос, шампунь для жирной кожи головы, тоник с никотиновой кислотой, восемь видов укладочных средств. Под вашу структуру волос мы подбираем средство, а не используем универсальное.
          - generic [ref=e301]:
            - generic [ref=e302]: "03"
            - generic [ref=e303]:
              - heading "Десять мастеров, не один универсал" [level=3] [ref=e304]
              - paragraph [ref=e305]: В нашем зале десять мастеров. Каждый — со своим почерком и любимыми техниками. Если ваша задача — fade с короткими висками и длинной макушкой, к Сайоду вы попадёте быстрее, чем к универсальному мастеру в массмаркете. Мы не назначаем мастера автоматически — вы выбираете.
          - generic [ref=e307]:
            - generic [ref=e308]: "04"
            - generic [ref=e309]:
              - heading "Тишина, а не open space" [level=3] [ref=e310]
              - paragraph [ref=e311]: В нашем зале — пять рабочих мест и десять минут между визитами. Вы не сидите рядом с другим клиентом «локоть в локоть», вас не отвлекает разговор соседа, и мастер не торопится — он работает с вашими волосами, а не «успевает до следующего».
