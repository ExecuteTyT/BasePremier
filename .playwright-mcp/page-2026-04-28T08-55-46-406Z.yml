      - generic [ref=e229]:
        - generic [ref=e230]:
          - heading "Процесс" [level=2] [ref=e231]
          - generic [ref=e232]:
            - generic [ref=e234]:
              - text: "01"
              - generic [ref=e235]:
                - heading "Час, а не 30 минут" [level=3] [ref=e236]
                - paragraph [ref=e237]: Большинство барбершопов выделяют 30 минут на стрижку. Мы — час. В этот час входит детокс кожи головы, мытьё, стрижка по структуре волос, моделирование, укладка и завершающее парфюмирование. В среднем — в два раза больше работы.
            - generic [ref=e239]:
              - text: "02"
              - generic [ref=e240]:
                - heading "Профессиональная косметика, а не один шампунь" [level=3] [ref=e241]
                - paragraph [ref=e242]: В нашем зале на полках — Graham Hill, Davines, The London Grooming Co и Solomon's. Шампунь для тонких волос, шампунь для жирной кожи головы, тоник с никотиновой кислотой, восемь видов укладочных средств. Под вашу структуру волос мы подбираем средство, а не используем универсальное.
            - generic [ref=e244]:
              - text: "03"
              - generic [ref=e245]:
                - heading "Десять мастеров, не один универсал" [level=3] [ref=e246]
                - paragraph [ref=e247]: В нашем зале десять мастеров. Каждый — со своим почерком и любимыми техниками. Если ваша задача — fade с короткими висками и длинной макушкой, к Сайоду вы попадёте быстрее, чем к универсальному мастеру в массмаркете. Мы не назначаем мастера автоматически — вы выбираете.
            - generic [ref=e249]:
              - text: "04"
              - generic [ref=e250]:
                - heading "Тишина, а не open space" [level=3] [ref=e251]
                - paragraph [ref=e252]: В нашем зале — пять рабочих мест и десять минут между визитами. Вы не сидите рядом с другим клиентом «локоть в локоть», вас не отвлекает разговор соседа, и мастер не торопится — он работает с вашими волосами, а не «успевает до следующего».
