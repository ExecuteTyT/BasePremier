        - generic [ref=e277]:
          - generic [ref=e279]:
            - generic [ref=e280]: "01"
            - generic [ref=e281]:
              - heading "Час, а не 30 минут" [level=3] [ref=e282]
              - paragraph [ref=e283]: Большинство барбершопов выделяют 30 минут на стрижку. Мы — час. В этот час входит детокс кожи головы, мытьё, стрижка по структуре волос, моделирование, укладка и завершающее парфюмирование. В среднем — в два раза больше работы.
          - generic [ref=e285]:
            - generic [ref=e286]: "02"
            - generic [ref=e287]:
              - heading "Профессиональная косметика, а не один шампунь" [level=3] [ref=e288]
              - paragraph [ref=e289]: В нашем зале на полках — Graham Hill, Davines, The London Grooming Co и Solomon's. Шампунь для тонких волос, шампунь для жирной кожи головы, тоник с никотиновой кислотой, восемь видов укладочных средств. Под вашу структуру волос мы подбираем средство, а не используем универсальное.
          - generic [ref=e291]:
            - generic [ref=e292]: "03"
            - generic [ref=e293]:
              - heading "Десять мастеров, не один универсал" [level=3] [ref=e294]
              - paragraph [ref=e295]: В нашем зале десять мастеров. Каждый — со своим почерком и любимыми техниками. Если ваша задача — fade с короткими висками и длинной макушкой, к Сайоду вы попадёте быстрее, чем к универсальному мастеру в массмаркете. Мы не назначаем мастера автоматически — вы выбираете.
          - generic [ref=e297]:
            - generic [ref=e298]: "04"
            - generic [ref=e299]:
              - heading "Тишина, а не open space" [level=3] [ref=e300]
              - paragraph [ref=e301]: В нашем зале — пять рабочих мест и десять минут между визитами. Вы не сидите рядом с другим клиентом «локоть в локоть», вас не отвлекает разговор соседа, и мастер не торопится — он работает с вашими волосами, а не «успевает до следующего».
