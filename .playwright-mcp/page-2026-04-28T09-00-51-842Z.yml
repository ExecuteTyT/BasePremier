              - paragraph [ref=e399]: Это категории мастеров. У младших мастеров — стартовая цена. У старших — финальная. Все мастера прошли одинаковое обучение внутри BASE Premier; разница в опыте, скорости и количестве отработанных случаев. Выбор — за вами.
